cds:
  odataV4.endpoint.path: /
---
spring:
  config.activate.on-profile: cloud
cds:
  messaging.services:
    samples-messaging:
      kind: enterprise-messaging
  remote.services:
    OrdersService:
      name: OrdersService
      type: "odata-v4"
      http:
        suffix: "/odata/v4"
      destination:
        name: "orders-dest"
    ReviewsService:
      name: ReviewsService
      type: "odata-v4"
      destination:
        name: "reviews-dest"
---
spring:
  config.activate.on-profile: default
  sql.init.platform: h2
cds:
  data-source:
    auto-config.enabled: false
    csv:
      paths:
      - db/data/**
      - ../db/data/**
      - ../bookshop/db/data/**
      - ../../bookshop/db/data/**
      - ../orders/db/data/**
      - ../../orders/db/data/**
      - ../reviews/db/data/**
      - ../../reviews/db/data/**
      - ../node_modules/@capire/common/data/**
      - ../../node_modules/@capire/common/data/**
  security.mock.users:
    alice:
      roles: [ "admin" ]
    bob:
      roles: [ "user" ]
  messaging.services:
    samples-messaging:
      kind: "file-based-messaging"
      binding: "${user.dir}/../../cap.samples.java.messages.txt"
server:
  port: 8080
---
spring:
  config.activate.on-profile: with-orders
cds:
  remote.services:
    OrdersService:
      name: OrdersService
      type: "odata-v4"
      http:
        suffix: "/odata/v4"
      destination:
        properties:
          url: "http://localhost:8081"
          username: "authenticated"
          password: ""
---
spring:
  config.activate.on-profile: with-reviews
cds:
  remote.services:
    ReviewsService:
      name: ReviewsService
      type: "odata-v4"
      destination:
        properties:
          url: http://localhost:8082
          username: "authenticated"
          password: ""
---
spring:
  config.activate.on-profile: hybrid
cds:
  messaging.services:
    samples-messaging:
      kind: enterprise-messaging
  security:
    xsuaa:
      enabled: false
    mock:
      enabled: true
      users:
        alice:
          roles: [ "admin" ]
        bob:
          roles: [ "user" ]
  indexPage.enabled: true
